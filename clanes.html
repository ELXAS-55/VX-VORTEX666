<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clanes derrotados | VX VORTEX⁶⁶⁶</title>
<style>
:root{--bg:#040711;--card:#0a1020;--red:#0d3d73;--red2:#2f8fff;--text:#fff;--dim:#aaa;--border:rgba(47,143,255,.25)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;position:relative;}
.space-bg{position:fixed;inset:0;z-index:-3;overflow:hidden;background:var(--bg);}
.stars-layer{position:absolute;inset:-50%;width:200%;height:200%;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, #ffffff 100%, transparent),
    radial-gradient(1.5px 1.5px at 75% 15%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 50% 60%, #bcd9ff 100%, transparent),
    radial-gradient(1.5px 1.5px at 85% 75%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 10% 80%, #bcd9ff 100%, transparent),
    radial-gradient(1.5px 1.5px at 35% 45%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 60% 90%, #ffffff 100%, transparent),
    radial-gradient(1.5px 1.5px at 92% 40%, #bcd9ff 100%, transparent),
    radial-gradient(1px 1px at 5% 55%, #ffffff 100%, transparent),
    radial-gradient(2px 2px at 45% 12%, #ffffff 100%, transparent);
  background-repeat:repeat;background-size:600px 600px;
  animation:driftStars 140s linear infinite;}
.stars-layer.layer2{background-size:900px 900px;opacity:.6;animation:driftStars2 200s linear infinite;}
.stars-layer.layer3{background-size:350px 350px;opacity:.5;animation:twinkle 4s ease-in-out infinite alternate, driftStars 90s linear infinite reverse;}
.nebula-glow{position:absolute;inset:0;
  background:radial-gradient(circle at 30% 20%, rgba(47,143,255,.16), transparent 45%),
              radial-gradient(circle at 80% 70%, rgba(13,61,115,.32), transparent 50%);
  animation:nebulaBreathe 10s ease-in-out infinite alternate;}
@keyframes driftStars{from{transform:translate(0,0);}to{transform:translate(-600px,-300px);}}
@keyframes driftStars2{from{transform:translate(0,0);}to{transform:translate(500px,-400px);}}
@keyframes twinkle{0%{opacity:.25;}100%{opacity:.7;}}
@keyframes nebulaBreathe{0%{opacity:.75;transform:scale(1);}100%{opacity:1;transform:scale(1.06);}}
@media(prefers-reduced-motion:reduce){.stars-layer,.nebula-glow{animation:none!important;}}

nav{display:flex;justify-content:space-between;align-items:center;padding:18px 5%;background:#0d0d0d;border-bottom:1px solid var(--border)}
.brand{color:white;text-decoration:none;font-weight:bold;font-size:1.1rem}
.nav-links{display:flex;gap:20px}.nav-links a{color:#aaa;text-decoration:none;font-weight:bold}.nav-links a:hover,.nav-links a.active{color:white}
.pagehead{text-align:center;padding:60px 20px 40px}.eyebrow{color:#5aa8ff;font-size:.8rem;font-weight:bold;letter-spacing:2px;margin-bottom:12px}.pagehead h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:12px}.pagehead p{color:var(--dim)}
main{width:90%;max-width:1200px;margin:auto;padding-bottom:60px}
.clan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px}
.clan-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:.25s}
.clan-card:hover{transform:translateY(-5px);border-color:#2f8fff}
.clan-img{height:220px;background:linear-gradient(135deg,#1b1b1b,#090909);display:flex;align-items:center;justify-content:center;font-size:4rem;color:#5aa8ff;overflow:hidden}
.clan-img img{width:100%;height:100%;object-fit:cover}
.clan-body{padding:20px}.clan-body h3{margin-bottom:12px}.clan-res{color:#2f8fff;font-weight:bold;margin-bottom:8px}.clan-date{color:var(--dim)}
.empty{text-align:center;color:var(--dim);padding:40px}
footer{text-align:center;padding:30px 20px;border-top:1px solid var(--border);color:var(--dim)}.fbrand{color:white;font-weight:bold;margin-bottom:8px}
@media(max-width:700px){nav{flex-direction:column;gap:15px}.nav-links{gap:12px;flex-wrap:wrap;justify-content:center}}

.modal{display:none;position:fixed;z-index:1000;inset:0;background:rgba(0,0,0,.78);align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-box{width:100%;max-width:420px;background:#0a1020;border:1px solid #2f8fff;border-radius:18px;padding:24px;position:relative;text-align:center}
.modal-close{position:absolute;top:10px;right:14px;background:none;border:0;color:#aaa;font-size:1.8rem;cursor:pointer}
.modal-photo{width:150px;height:150px;border-radius:18px;overflow:hidden;margin:0 auto 16px;background:linear-gradient(135deg,#1b1b1b,#090909);display:flex;align-items:center;justify-content:center;color:#5aa8ff;font-size:4rem}
.modal-photo img{width:100%;height:100%;object-fit:cover}
.modal-box h2{margin-bottom:12px}
</style>
</head>
<body>
<div class="space-bg">
  <div class="stars-layer"></div>
  <div class="stars-layer layer2"></div>
  <div class="stars-layer layer3"></div>
  <div class="nebula-glow"></div>
</div>
<nav>
<a href="index.html" class="brand">⚡ VX VORTEX⁶⁶⁶</a>
<div class="nav-links">
<a href="index.html">Inicio</a><a href="liderazgo.html">Liderazgo</a><a href="integrantes.html">Integrantes</a><a href="clanes.html" class="active">Clanes</a><a href="login.html">Admin</a>
</div>
</nav>
<section class="pagehead">
<div class="eyebrow">HISTORIAL DE GUERRA</div>
<h1>Clanes derrotados</h1>
<p>Los clanes a los que VX VORTEX⁶⁶⁶ les ha ganado.</p>
</section>
<main><div id="gridClanes" class="clan-grid"><p class="empty">Cargando...</p></div></main>
<div id="infoModal" class="modal">
<div class="modal-box">
<button class="modal-close" id="cerrarInfo">&times;</button>
<div id="infoFoto" class="modal-photo"></div>
<h2 id="infoNombre">Sin nombre</h2>
<div id="infoResultado" class="clan-res"></div>
<div id="infoFecha" class="clan-date"></div>
</div>
</div>
<footer><div class="fbrand">VX VORTEX⁶⁶⁶</div><p>Clan de Free Fire © 2026</p></footer>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
apiKey:"AIzaSyD6IbhFlbhrCNy1lPpJ49_By3tt-aGiDJQ",
authDomain:"vx-vortex-666-288f7.firebaseapp.com",
projectId:"vx-vortex-666-288f7",
storageBucket:"vx-vortex-666-288f7.firebasestorage.app",
messagingSenderId:"1053204421634",
appId:"1:1053204421634:web:74871508e1b22371c39b1b"
});
const db=firebase.firestore(),grid=document.getElementById("gridClanes");
db.collection("clanes").orderBy("fechaISO","desc").onSnapshot(snap=>{
if(snap.empty){grid.innerHTML='<p class="empty">Todavía no hay clanes derrotados registrados.</p>';return}
grid.innerHTML="";
snap.forEach(doc=>{
const c=doc.data();
const card = document.createElement("div");
card.className = "clan-card";
card.style.cursor = "pointer";

const nombre = c.nombre || "Sin nombre";
const foto = c.foto || "";

card.innerHTML = `
<div class="clan-img">${foto ? `<img src="${foto}" alt="${nombre}">` : "🏆"}</div>
<div class="clan-body">
<h3>${nombre}</h3>
<div class="clan-res">${c.resultado || ""}</div>
<div class="clan-date">${c.fecha || ""}</div>
</div>
`;

card.addEventListener("click", () => {
document.getElementById("infoNombre").textContent = nombre;
document.getElementById("infoResultado").textContent = c.resultado || "";
document.getElementById("infoFecha").textContent = c.fecha || "";

const infoFoto = document.getElementById("infoFoto");
infoFoto.innerHTML = foto ? `<img src="${foto}" alt="${nombre}">` : "🏆";

document.getElementById("infoModal").classList.add("show");
});

grid.appendChild(card);
});
},()=>{grid.innerHTML='<p class="empty">❌ No se pudieron cargar los clanes.</p>'});
const infoModal = document.getElementById("infoModal");
const cerrarInfo = document.getElementById("cerrarInfo");

cerrarInfo.addEventListener("click", () => {
infoModal.classList.remove("show");
});

infoModal.addEventListener("click", e => {
if(e.target === infoModal) infoModal.classList.remove("show");
});
</script>
</body>
</html>
