<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agregar Integrante</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
text-align:center;
}

h1{
margin-top:40px;
color:#ff7a00;
}

.formulario{
width:90%;
max-width:400px;
margin:30px auto;
padding:20px;
border:2px solid #ff7a00;
border-radius:12px;
background:rgba(0,0,0,.5);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ff7a00;
background:#111;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:15px;
background:#ff7a00;
border:none;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.card{
border:2px solid #ff7a00;
margin:10px;
padding:10px;
border-radius:10px;
}

.card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<h1>➕ AGREGAR INTEGRANTE</h1>

<div class="formulario">
<input id="nombre" placeholder="Nombre">
<input id="rango" placeholder="Rango">
<input id="img" placeholder="URL de imagen">

<button onclick="guardar()">GUARDAR INTEGRANTE</button>
</div>

<div id="lista"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// GUARDAR INTEGRANTE
function guardar(){
const nombre = document.getElementById("nombre").value;
const rango = document.getElementById("rango").value;
const img = document.getElementById("img").value;

db.collection("integrantes").add({
nombre,
rango,
img
});

document.getElementById("nombre").value="";
document.getElementById("rango").value="";
document.getElementById("img").value="";
}

// MOSTRAR INTEGRANTES
db.collection("integrantes").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
let d = doc.data();

html += `
<div class="card">
<img src="${d.img}">
<h3>${d.nombre}</h3>
<p>${d.rango}</p>
</div>
`;
});

document.getElementById("lista").innerHTML = html;
});
</script>

</body>
</html>
